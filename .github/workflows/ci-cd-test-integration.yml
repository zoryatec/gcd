name: ci-cd-test-integration

on:
  workflow_call: # This allows this workflow to be called by other workflows

jobs:
  test-end-to-end:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: download gcd 
        uses: actions/download-artifact@v4.1.8
        with:
          name: gcd-bin
          path: gcd-bootstrap

      - name: download integration tests
        uses: actions/download-artifact@v4.1.8
        with:
          name: gcd-integration-tests
          path: integration-tests 

      - name: add gcd to path
        run: |
          echo "$env:GITHUB_WORKSPACE\\gcd-bootstrap" >> $env:GITHUB_PATH

      - name: setup gcd
        run: |
          gcd --version  
          gcd config set --nipkg-installer-uri "https://download.ni.com/support/nipkg/products/ni-package-manager/installers/NIPackageManager21.3.0_online.exe"
          gcd config set --nipkg-cmd-path  "C:\\Program Files\\National Instruments\\NI Package Manager\\nipkg.exe"

      - name: install nipkg
        run: |
          gcd tools install-nipkg
        working-directory: ./gcd-bootstrap

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build src/Gcd/Gcd.csproj  --no-restore

      - name: Test
        env:
          AZUREADDPKGTESTFEEDURI: ${{ secrets.AZUREADDPKGTESTFEEDURI }}
          AZUREFEEDURI: ${{ secrets.AZUREFEEDURI }}
          AZUREPUSHPULLTESTFEEDURI: ${{ secrets.AZUREPUSHPULLTESTFEEDURI }}
          NIPKGINSTALLERURI: ${{ secrets.NIPKGINSTALLERURI }}
          NIPKGCMDPATH: ${{ secrets.NIPKGCMDPATH }}

        run: dotnet test tests/Gcd.Tests.EndToEnd/Gcd.Tests.EndToEnd.csproj
