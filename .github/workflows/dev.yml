name: dev

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
  

  ci-cd:
    uses: ./.github/workflows/ci-cd.yml
    secrets: inherit
    with:
      version: "0.5.0-${{github.run_number}}"
      name: gcd
      feed: ${{ vars.NIPK_DEV_FEED_READABLE }}
