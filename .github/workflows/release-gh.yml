name: 'release-gh'

on:
  workflow_dispatch:
    inputs:
        tag:
          required: true
          type: string

jobs:
  publish-new-version:
    runs-on: windows-latest
    steps:
    - name: download gcd 
      uses: actions/download-artifact@v4.1.8
      with:
        name: gcd-bin
        path: gcd-bin

    - name: download integration tests
      uses: actions/download-artifact@v4.1.8
      with:
        name: gcd-test
        path: gcd-test

    - name: create release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ inputs.tag }}  
        files: gcd-bin/** 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
